<!DOCTYPE html>
<html>

<head>
    <title>Donate Blood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 w-50">

    <h3 class="text-center">❤️ Donate Blood</h3>

    <div id="msg" class="alert alert-success d-none">Donor Added!</div>

    <form id="donorForm">

        <input class="form-control mb-2" name="name" placeholder="Name" required>

        <select class="form-control mb-2" name="bloodGroup" required>
            <option value="">Blood Group</option>
            <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
        </select>

        <input class="form-control mb-2" name="gender" placeholder="Gender" required>
        <input class="form-control mb-2" name="phone" placeholder="Phone" required>
        <input class="form-control mb-2" name="city" placeholder="City" required>

        <button class="btn btn-danger w-100">Submit</button>

    </form>

</div>

</div>

<script>
const form = document.getElementById("donorForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = Object.fromEntries(new FormData(form));

    const res = await fetch("/add-donor", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if(result.success){
        msg.classList.remove("d-none");
        form.reset();

        setTimeout(() => msg.classList.add("d-none"), 3000);
    } else {
        alert("Error adding donor");
    }
});
</script>

</body>
</html>
