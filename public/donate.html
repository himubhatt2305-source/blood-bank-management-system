<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Blood</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 glass-card">
                <h2 class="text-center mb-4">Donor Registration</h2>
                <form id="donorForm">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                    
                    <label class="form-label">Blood Group</label>
                    <select name="bloodGroup" class="form-select" required>
                        <option value="A+">A+</option>
                        <option value="B+">B+</option>
                        <option value="O+">O+</option>
                        <option value="AB+">AB+</option>
                    </select>

                    <label class="form-label">Phone Number</label>
                    <input type="number" name="phone" class="form-control" placeholder="10 digit number" required>

                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" placeholder="Enter City" required>

                    <button type="submit" class="btn btn-danger w-100 py-3 mt-3">Register to Donate</button>
                    <div class="text-center mt-3"><a href="index.html" class="text-white-50">Back to Home</a></div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('donorForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const res = await fetch('/add-donor', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            if(res.ok) { alert("Thank you for registering!"); window.location.href="index.html"; }
        };
    </script>
</body>
</html>
