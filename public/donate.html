<!DOCTYPE html>
<html>
<head>
  <title>Donate Blood</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f3f6;
    }

    .form-box {
      width: 95%;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input {
      margin-bottom: 10px;
    }

    button {
      border-radius: 25px;
    }
  </style>
</head>

<body>

<div class="form-box">
  <h4 class="text-center text-danger">Donate Blood</h4>

  <form action="/add-donor" method="POST">
    <input name="name" class="form-control" placeholder="Name" required>
    <input name="bloodGroup" class="form-control" placeholder="Blood Group" required>
    <input name="phone" class="form-control" placeholder="Phone" required>
    <input name="city" class="form-control" placeholder="City" required>

    <button class="btn btn-danger w-100 mt-2">Submit</button>
  </form>
</div>

</body>
</html>
