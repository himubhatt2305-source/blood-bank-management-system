<!DOCTYPE html>
<html>
<head>
    <title>Donate Blood | Save Lives</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center" style="min-height:100vh; background: #0f172a;">

<div class="card-box" style="width: 100%; max-width: 500px;">
    <h3 class="text-center mb-4" style="color: white;">❤️ Donate Blood</h3>
    <div id="msg" class="alert alert-success d-none">Donor Added Successfully!</div>

    <form id="donorForm">
        <input type="text" name="name" placeholder="Full Name" required>
        
        <select name="bloodGroup" required>
            <option value="" disabled selected>Select Blood Group</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option>
            <option>AB+</option><option>AB-</option>
        </select>

        <select name="gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="city" placeholder="City" required>

        <button type="submit" class="btn-red">Submit Donation</button>
    </form>
    <div class="text-center mt-3">
        <a href="index.html" style="color: #cbd5e1; text-decoration: none; font-size: 14px;">← Back to Home</a>
    </div>
</div>

<script>
    document.getElementById("donorForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("msg");
        const data = Object.fromEntries(new FormData(e.target));

        try {
            const res = await fetch("/add-donor", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success){
                msg.classList.remove("d-none");
                e.target.reset();
                setTimeout(() => msg.classList.add("d-none"), 3000);
            }
        } catch (err) { alert("Error connecting to server"); }
    });
</script>
</body>
</html>
