<!DOCTYPE html>
<html>
<head>
  <title>Donate Blood</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark p-3">
  <div class="container">
    <span class="navbar-brand">
      <i class="fa-solid fa-droplet text-danger"></i> Donate Blood
    </span>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">

  <div class="glass col-md-5">

    <h3 class="text-center mb-4">❤️ Save Lives</h3>

    <!-- SUCCESS MESSAGE -->
    <div id="successMsg" class="alert alert-success text-center" style="display:none;">
      ❤️ Donor added successfully!
    </div>

    <!-- FORM -->
    <form id="donorForm">

      <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>

      <select name="bloodGroup" class="form-select mb-3" required>
        <option value="">Select Blood Group</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option>
        <option>AB+</option><option>AB-</option>
      </select>

      <!-- 🔥 GENDER FIELD (IMPORTANT) -->
      <select name="gender" class="form-select mb-3" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>

      <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>

      <input type="text" name="city" class="form-control mb-3" placeholder="City" required>

      <button class="btn btn-danger w-100">
        ❤️ Submit
      </button>

    </form>

  </div>

</div>

<script>

const form = document.getElementById("donorForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch('/add-donor', {
    method: 'POST',
    body: formData
  })
  .then(res => res.json())
  .then(() => {
    successMsg.style.display = "block";
    form.reset();

    setTimeout(() => {
      successMsg.style.display = "none";
    }, 3000);
  })
  .catch(() => {
    alert("Error adding donor");
  });

});

</script>

</body>
</html>
