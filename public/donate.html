<!DOCTYPE html>
<html>
<head>
  <title>Donate Blood</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
body {
  margin: 0;
  font-family: sans-serif;

  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5");

  background-size: cover;
  background-position: center;
}

/* Glass Card */
.form-box {
  max-width: 400px;
  margin: 80px auto;
  padding: 30px;
  border-radius: 15px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.form-box h3 {
  text-align: center;
  margin-bottom: 20px;
}

/* Inputs */
.form-control {
  margin-bottom: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
}

.form-control::placeholder {
  color: #eee;
}

/* Button */
.btn-danger {
  border-radius: 10px;
  width: 100%;
}

/* Icon top */
.icon-top {
  text-align: center;
  font-size: 40px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="form-box">

  <div class="icon-top">
    <i class="fa-solid fa-heart-pulse"></i>
  </div>

  <h3>Donate Blood</h3>

  <form action="/add-donor" method="POST">

    <input type="text" name="name" placeholder="👤 Name" class="form-control" required>

    <input type="text" name="bloodGroup" placeholder="🩸 Blood Group" class="form-control" required>

    <input type="text" name="phone" placeholder="📞 Phone" class="form-control" required>

    <input type="text" name="city" placeholder="📍 City" class="form-control" required>

    <button class="btn btn-danger">Donate Now ❤️</button>

  </form>

</div>

</body>
</html>
