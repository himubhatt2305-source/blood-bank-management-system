<!DOCTYPE html>
<html>
<head>
  <title>Donate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h2 class="text-danger text-center">Donate Blood</h2>

    <input id="name" class="form-control my-2" placeholder="Name">
    <input id="group" class="form-control my-2" placeholder="Blood Group">
    <input id="phone" class="form-control my-2" placeholder="Phone">
    <input id="city" class="form-control my-2" placeholder="City">

    <button type="button" onclick="addDonor()" class="btn btn-danger w-100 mt-3">
      Submit
    </button>
  </div>
</div>

<script>
function addDonor() {
  fetch('http://localhost:3000/add-donor', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      bloodGroup: document.getElementById("group").value,
      phone: document.getElementById("phone").value,
      city: document.getElementById("city").value
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    
    // clear form after success
    document.getElementById("name").value = "";
    document.getElementById("group").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("city").value = "";
  })
  .catch(err => {
    console.log(err);
    alert("Error saving donor");
  });
}
</script>

</body>
</html>
