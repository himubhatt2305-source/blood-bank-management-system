<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate Blood</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-page">

    <div class="modern-form-card">

        <h1 class="form-title">
            🩸 Become a Blood Donor
        </h1>

        <p class="form-subtitle">
            Your donation can save lives
        </p>

        <form id="donorForm">

            <div class="input-group">

                <label>
                    Full Name
                </label>

                <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required>

            </div>

            <div class="input-group">

                <label>
                    Blood Group
                </label>

                <select name="bloodGroup" required>

                    <option value="">
                        Select Blood Group
                    </option>

                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>

                </select>

            </div>

            <div class="input-group">

                <label>
                    Phone Number
                </label>

                <input
                type="text"
                name="phone"
                placeholder="Enter phone number"
                required>

            </div>

            <div class="input-group">

                <label>
                    City
                </label>

                <input
                type="text"
                name="city"
                placeholder="Enter your city"
                required>

            </div>

            <button type="submit" class="btn-red full-btn">
                Register as Donor
            </button>

        </form>

        <div class="back-home">

            <a href="index.html">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

<script>

document.getElementById('donorForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const data =
    Object.fromEntries(
        new FormData(this)
    );

    try{

        const res =
        await fetch('/add-donor',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)

        });

        const result =
        await res.json();

        if(result.success){

            alert("Donor Registered Successfully");

            this.reset();

        }

        else{

            alert("Registration Failed");

        }

    }

    catch(err){

        alert("Server Error");

    }

});

</script>

</body>
</html>
