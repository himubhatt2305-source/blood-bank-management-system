<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .navbar {
      background: linear-gradient(45deg, #dc3545, #ff6b6b);
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .card i {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .btn {
      border-radius: 20px;
    }

    .table {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    @media(max-width:768px){
      .card {
        margin-bottom: 15px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark p-3">
  <div class="container">
    <span class="navbar-brand"><i class="fa-solid fa-droplet"></i> Blood Bank</span>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- STATS -->
  <div class="row text-center">

    <div class="col-6 col-md-3">
      <div class="card p-3">
        <i class="fa-solid fa-users text-primary"></i>
        <h4 id="totalDonors">0</h4>
        <p>Donors</p>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card p-3">
        <i class="fa-solid fa-notes-medical text-danger"></i>
        <h4 id="totalRequests">0</h4>
        <p>Requests</p>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card p-3">
        <i class="fa-solid fa-check text-success"></i>
        <h4 id="approvedCount">0</h4>
        <p>Approved</p>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card p-3">
        <i class="fa-solid fa-clock text-warning"></i>
        <h4 id="pendingCount">0</h4>
        <p>Pending</p>
      </div>
    </div>

  </div>

  <!-- ACTION BAR -->
  <div class="d-flex flex-wrap justify-content-between align-items-center mt-4 mb-3">

    <select id="searchInput" class="form-select w-auto" onchange="searchDonor()">
      <option value="">Filter Blood Group</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>

    <a href="requests.html" class="btn btn-dark mt-2 mt-md-0">
      <i class="fa-solid fa-list"></i> Requests
    </a>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-danger text-center">
        <tr>
          <th>Name</th>
          <th>Blood</th>
          <th>Phone</th>
          <th>City</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="donorTable"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let editId = null;

// LOAD DONORS
function loadDonors() {
  fetch('/donors')
  .then(res => res.json())
  .then(data => {
    document.getElementById("totalDonors").innerText = data.length;
    renderTable(data);
  });
}

// LOAD STATS
function loadStats() {
  fetch('/requests')
  .then(res => res.json())
  .then(data => {

    document.getElementById("totalRequests").innerText = data.length;

    let approved = data.filter(r => r.status === "Approved").length;
    let pending = data.filter(r => r.status === "Pending").length;

    document.getElementById("approvedCount").innerText = approved;
    document.getElementById("pendingCount").innerText = pending;
  });
}

// TABLE
function renderTable(data) {
  const table = document.getElementById("donorTable");
  table.innerHTML = "";

  data.forEach(d => {
    table.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>
        <button class="btn btn-sm btn-warning">Edit</button>
        <button onclick="deleteDonor('${d._id}')" class="btn btn-sm btn-danger">Delete</button>
      </td>
    </tr>`;
  });
}

// DELETE
function deleteDonor(id) {
  if (!confirm("Delete donor?")) return;

  fetch(`/delete-donor/${id}`, { method: "DELETE" })
  .then(res => res.text())
  .then(() => {
    loadDonors();
    loadStats();
  });
}

// SEARCH
function searchDonor() {
  const bg = searchInput.value;

  if (!bg) return loadDonors();

  fetch(`/search?bloodGroup=${bg}`)
  .then(res => res.json())
  .then(data => renderTable(data));
}

// INIT
loadDonors();
loadStats();

</script>

</body>
</html>
