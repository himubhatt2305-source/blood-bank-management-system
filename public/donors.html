<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ANIMATION -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h4><i class="fa-solid fa-droplet text-danger"></i> Blood Bank</h4>

  <a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="request.html"><i class="fa-solid fa-list"></i> Requests</a>
  <a href="#"><i class="fa-solid fa-user"></i> Donors</a>
  <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<!-- OVERLAY (FOR MOBILE CLOSE) -->
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- CONTENT -->
<div class="content">

  <!-- TOP BAR -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <span class="menu-btn" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </span>
    <h4>Dashboard</h4>
  </div>

  <!-- WELCOME -->
  <div class="glass mb-4" data-aos="fade-down">
    <h3>👋 Welcome Admin</h3>
    <p>Manage donors and save lives ❤️</p>
  </div>

  <!-- CARDS -->
  <div class="row text-center">

    <div class="col-6 col-md-3 mb-3">
      <div class="card card-red" data-aos="zoom-in">
        <i class="fa-solid fa-users"></i>
        <h4 id="totalDonors">0</h4>
        <p>Donors</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card card-blue" data-aos="zoom-in">
        <i class="fa-solid fa-notes-medical"></i>
        <h4 id="totalRequests">0</h4>
        <p>Requests</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card card-green" data-aos="zoom-in">
        <i class="fa-solid fa-check"></i>
        <h4 id="approvedCount">0</h4>
        <p>Approved</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card card-yellow" data-aos="zoom-in">
        <i class="fa-solid fa-clock"></i>
        <h4 id="pendingCount">0</h4>
        <p>Pending</p>
      </div>
    </div>

  </div>

  <!-- CHART -->
  <div class="glass mt-4" data-aos="fade-up">
    <h5 class="mb-3">📊 Blood Group Distribution</h5>
    <canvas id="bloodChart"></canvas>
  </div>

  <!-- FILTER -->
  <div class="mt-4 mb-3">
    <select id="searchInput" class="form-select w-50" onchange="searchDonor()">
      <option value="">Filter Blood</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered text-center">
      <thead class="table-danger text-white">
        <tr>
          <th>Name</th>
          <th>Blood</th>
          <th>Phone</th>
          <th>City</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="donorTable"></tbody>
    </table>
  </div>

</div>

<!-- JS -->
<script>
AOS.init();

/* SIDEBAR TOGGLE + OVERLAY */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* LOAD DONORS */
function loadDonors(){
  fetch('/donors')
  .then(res=>res.json())
  .then(data=>{
    totalDonors.innerText=data.length;
    renderTable(data);
    loadChart(data);
  });
}

/* LOAD STATS */
function loadStats(){
  fetch('/requests')
  .then(res=>res.json())
  .then(data=>{
    totalRequests.innerText=data.length;
    approvedCount.innerText=data.filter(r=>r.status==="Approved").length;
    pendingCount.innerText=data.filter(r=>r.status==="Pending").length;
  });
}

/* TABLE RENDER */
function renderTable(data){
  donorTable.innerHTML="";
  data.forEach(d=>{
    donorTable.innerHTML+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>
        <button onclick="deleteDonor('${d._id}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    </tr>`;
  });
}

/* DELETE */
function deleteDonor(id){
  if(!confirm("Delete?")) return;
  fetch('/delete-donor/'+id,{method:"DELETE"})
  .then(()=>{loadDonors();loadStats();});
}

/* SEARCH */
function searchDonor(){
  const bg=searchInput.value;
  if(!bg) return loadDonors();

  fetch('/search?bloodGroup='+bg)
  .then(res=>res.json())
  .then(data=>renderTable(data));
}

/* CHART */
function loadChart(data){
  const counts={};
  data.forEach(d=>{
    counts[d.bloodGroup]=(counts[d.bloodGroup]||0)+1;
  });

  new Chart(document.getElementById("bloodChart"),{
    type:'doughnut',
    data:{
      labels:Object.keys(counts),
      datasets:[{
        data:Object.values(counts),
        backgroundColor:[
          '#ff4d4d','#ff9999','#dc3545','#b02a37',
          '#ff6666','#ff1a1a','#cc0000','#990000'
        ]
      }]
    },
    options:{
      plugins:{
        legend:{labels:{color:'white'}}
      }
    }
  });
}

/* INIT */
loadDonors();
loadStats();
</script>

</body>
</html>
