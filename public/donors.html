<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Blood Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="sidebar">
        <h4 class="text-center py-4">🩸 Blood Bank</h4>
        <a href="donors.html"><i class="fas fa-columns me-2"></i> Dashboard</a>
        <a href="requests.html"><i class="fas fa-paper-plane me-2"></i> Requests</a>
        <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="content">
        <h2 class="fw-bold mb-4">Management Dashboard</h2>

        <div class="row">
            <div class="col-md-3"><div class="card-stat card-red"><h2 id="totalDonors">0</h2><p>Donors</p></div></div>
            <div class="col-md-3"><div class="card-stat card-blue"><h2 id="totalRequests">0</h2><p>Requests</p></div></div>
            <div class="col-md-3"><div class="card-stat card-green"><h2 id="approvedCount">0</h2><p>Approved</p></div></div>
            <div class="col-md-3"><div class="card-stat card-yellow"><h2 id="pendingCount">0</h2><p>Pending</p></div></div>
        </div>

        <div class="table-container shadow">
            <input id="liveSearch" class="form-control mb-3" placeholder="🔍 Search donors...">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Blood Group</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th id="adminHead" style="display:none;">Action</th>
                    </tr>
                </thead>
                <tbody id="donorTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let isAdmin = false;

        async function start() {
            // Check Admin Status
            try {
                const userRes = await fetch('/me');
                const userData = await userRes.json();
                isAdmin = (userData.user === "admin");
                if(isAdmin) document.getElementById('adminHead').style.display = "table-cell";
            } catch(e) { console.log("User not logged in"); }

            // Load Donors and Stats (Done for everyone)
            loadDonors();
            loadStats();
        }

        function loadDonors() {
            fetch('/donors').then(r => r.json()).then(data => {
                const tbody = document.getElementById('donorTable');
                tbody.innerHTML = data.map(d => `
                    <tr>
                        <td><b>${d.name}</b></td>
                        <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
                        <td>${d.phone}</td>
                        <td>${d.city}</td>
                        ${isAdmin ? `<td><button class="btn btn-sm btn-danger" onclick="deleteItem('${d._id}')">Delete</button></td>` : ''}
                    </tr>
                `).join('');
                document.getElementById('totalDonors').innerText = data.length;
            });
        }

        function loadStats() {
            fetch('/requests').then(r => r.json()).then(data => {
                document.getElementById('totalRequests').innerText = data.length;
                document.getElementById('approvedCount').innerText = data.filter(r => r.status === "Approved").length;
                document.getElementById('pendingCount').innerText = data.filter(r => r.status === "Pending").length;
            });
        }

        start();
    </script>
</body>
</html>
