<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Blood Bank</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<button class="menu-btn" onclick="toggleMenu()">
  <i class="fas fa-bars"></i>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="mySidebar">
  <button class="btn text-white d-lg-none" style="position:absolute; right:10px; top:10px;" onclick="toggleMenu()">
    <i class="fas fa-times"></i>
  </button>

  <h4 class="text-center py-4">🩸 Blood Bank</h4>

  <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
  <a href="requests.html"><i class="fas fa-list me-2"></i> Requests</a>
  <a href="/logout" class="text-danger mt-5">
    <i class="fas fa-sign-out-alt me-2"></i> Logout
  </a>
</div>

<!-- CONTENT -->
<div class="content">

<h2 class="fw-bold mb-4">Management Dashboard</h2>

<!-- STATS -->
<div class="row">
  <div class="col-6 col-md-3">
    <div class="card-stat card-red">
      <h2 id="totalDonors">0</h2>
      <p>Donors</p>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card-stat card-blue">
      <h2 id="totalRequests">0</h2>
      <p>Requests</p>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card-stat card-green">
      <h2 id="approvedCount">0</h2>
      <p>Approved</p>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card-stat card-yellow">
      <h2 id="pendingCount">0</h2>
      <p>Pending</p>
    </div>
  </div>
</div>

<!-- 🔥 SEARCH BLOOD GROUP -->
<div class="table-container shadow mt-4">

  <input id="bloodSearch" class="form-control mb-3"
    placeholder="🔍 Enter Blood Group (A+, O-, AB+...)">

  <div id="resultBox" class="text-center fw-bold mb-3"></div>

  <div id="requestBtnBox" class="text-center"></div>

  <!-- ADMIN TABLE -->
  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>Name</th>
          <th>Blood</th>
          <th>Phone</th>
          <th>City</th>
          <th id="adminHead" style="display:none;">Action</th>
        </tr>
      </thead>
      <tbody id="donorTable"></tbody>
    </table>
  </div>

</div>

</div>

<script>

let isAdmin = false;
let allDonors = [];

/* SIDEBAR */
function toggleMenu(){
  document.getElementById("mySidebar").classList.toggle("active");
}

/* CHECK ADMIN */
async function start(){
  try{
    const res = await fetch('/me');
    const user = await res.json();
    isAdmin = (user.user === "admin");

    if(isAdmin){
      document.getElementById('adminHead').style.display = "table-cell";
    }

  }catch(e){}

  loadDonors();
  loadStats();
}

/* LOAD DONORS */
function loadDonors(){
  fetch('/donors')
  .then(res=>res.json())
  .then(data=>{
    allDonors = data;

    if(isAdmin){
      renderTable(data);
    }

    document.getElementById('totalDonors').innerText = data.length;
  });
}

/* LOAD STATS */
function loadStats(){
  fetch('/requests')
  .then(res=>res.json())
  .then(data=>{
    document.getElementById('totalRequests').innerText = data.length;
    document.getElementById('approvedCount').innerText =
      data.filter(r=>r.status==="Approved").length;
    document.getElementById('pendingCount').innerText =
      data.filter(r=>r.status==="Pending").length;
  });
}

/* ADMIN TABLE */
function renderTable(data){
  donorTable.innerHTML = data.map(d=>`
    <tr>
      <td><b>${d.name}</b></td>
      <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
      <td>${d.phone}</td>
      <td>${d.city}</td>

      ${isAdmin ? `
      <td>
        <button class="btn btn-sm btn-danger"
        onclick="deleteItem('${d._id}')">Delete</button>
      </td>` : ""}
    </tr>
  `).join('');
}

/* DELETE */
function deleteItem(id){
  fetch('/delete-donor/'+id,{method:"DELETE"})
  .then(()=>loadDonors());
}

/* 🔥 BLOOD SEARCH */
document.getElementById("bloodSearch").addEventListener("input",function(){

  const val = this.value.trim().toUpperCase();

  if(!val){
    resultBox.innerHTML = "";
    requestBtnBox.innerHTML = "";
    return;
  }

  const found = allDonors.some(d =>
    d.bloodGroup.trim().toUpperCase() === val
  );

  if(found){
    resultBox.innerHTML = "✅ Blood Available";
    resultBox.style.color = "green";

    requestBtnBox.innerHTML = `
      <a href="index.html" class="btn btn-danger">
        Request Blood
      </a>
    `;
  }else{
    resultBox.innerHTML = "❌ Not Available";
    resultBox.style.color = "red";
    requestBtnBox.innerHTML = "";
  }

});

start();

</script>

</body>
</html>
