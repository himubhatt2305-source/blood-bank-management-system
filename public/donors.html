<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h4>🩸 Blood Bank</h4>
  <a href="#">Dashboard</a>
  <a href="request.html">Requests</a>
  <a href="#">Donors</a>
  <a href="/logout">Logout</a>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- CONTENT -->
<div class="content">

<div class="d-flex justify-content-between align-items-center mb-3">
  <span class="menu-btn" onclick="toggleSidebar()">☰</span>

  <div class="d-flex align-items-center gap-2">
    <h4 class="mb-0">Dashboard</h4>
    <button onclick="toggleTheme()" class="btn btn-light btn-sm">🌙</button>
  </div>
</div>

<div class="glass mb-4">
  <h3>👋 Welcome Admin</h3>
</div>

<!-- CARDS -->
<div class="row text-center">
  <div class="col-6 col-md-3 mb-3">
    <div class="card card-red">
      <h4 id="totalDonors">0</h4>
      <p>Donors</p>
    </div>
  </div>

  <div class="col-6 col-md-3 mb-3">
    <div class="card card-blue">
      <h4 id="totalRequests">0</h4>
      <p>Requests</p>
    </div>
  </div>

  <div class="col-6 col-md-3 mb-3">
    <div class="card card-green">
      <h4 id="approvedCount">0</h4>
      <p>Approved</p>
    </div>
  </div>

  <div class="col-6 col-md-3 mb-3">
    <div class="card card-yellow">
      <h4 id="pendingCount">0</h4>
      <p>Pending</p>
    </div>
  </div>
</div>

<!-- SEARCH -->
<input id="liveSearch" class="form-control mt-3 mb-3" placeholder="Search...">

<!-- TABLE -->
<div class="table-responsive">
  <table class="table table-bordered text-center">
    <thead class="table-danger text-white">
      <tr>
        <th>Name</th>
        <th>Blood</th>
        <th>Phone</th>
        <th>City</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="donorTable"></tbody>
  </table>
</div>

</div>

<!-- TOAST -->
<div id="toastBox"></div>

<script>

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* DATA */
let allDonors=[];

/* LOADING */
function showLoading(){
  donorTable.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";
}

/* TOAST */
function showToast(msg){
  const div=document.createElement("div");
  div.className="alert alert-success";
  div.innerText=msg;
  toastBox.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

/* COUNTER */
function animateCount(id,end){
  let start=0;
  const step=Math.ceil(end/30);
  const interval=setInterval(()=>{
    start+=step;
    if(start>=end){
      start=end;
      clearInterval(interval);
    }
    document.getElementById(id).innerText=start;
  },20);
}

/* LOAD */
function loadDonors(){
  showLoading();
  fetch('/donors')
  .then(res=>res.json())
  .then(data=>{
    allDonors=data;
    animateCount("totalDonors",data.length);
    renderTable(data);
  });
}

function loadStats(){
  fetch('/requests')
  .then(res=>res.json())
  .then(data=>{
    animateCount("totalRequests",data.length);
    animateCount("approvedCount",data.filter(r=>r.status==="Approved").length);
    animateCount("pendingCount",data.filter(r=>r.status==="Pending").length);
  });
}

/* TABLE */
function renderTable(data){
  donorTable.innerHTML="";
  data.forEach(d=>{
    donorTable.innerHTML+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>
        <button onclick="deleteDonor('${d._id}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    </tr>`;
  });
}

/* DELETE */
function deleteDonor(id){
  fetch('/delete-donor/'+id,{method:"DELETE"})
  .then(()=>{
    showToast("Deleted");
    loadDonors();
    loadStats();
  });
}

/* SEARCH */
liveSearch.addEventListener("input",function(){
  const q=this.value.toLowerCase();
  const filtered=allDonors.filter(d=>
    d.name.toLowerCase().includes(q) ||
    d.city.toLowerCase().includes(q) ||
    d.phone.includes(q)
  );
  renderTable(filtered);
});

/* INIT */
loadDonors();
loadStats();

</script>

</body>
</html>
