<!DOCTYPE html>
<html>

<head>
    <title>Donors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h3>Dashboard</h3>
    <a href="donors.html">Donors</a>
    <a href="requests.html">Requests</a>
</div>

<div class="content">

    <h2>Donors List</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>Phone</th>
                <th>City</th>
            </tr>
        </thead>

        <tbody id="list"></tbody>
    </table>

</div>

<script>
async function loadDonors() {
    const res = await fetch('/donors');
    const data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `
        <tr>
            <td>${d.name}</td>
            <td>${d.bloodGroup}</td>
            <td>${d.phone}</td>
            <td>${d.city}</td>
        </tr>`;
    });

    document.getElementById("list").innerHTML = html;
}

loadDonors();
</script>

</body>
</html>
