<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donors Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body{
  background:#0f172a;
  color:white;
}

.sidebar{
  position:fixed;
  width:220px;
  height:100%;
  background:#111827;
  padding:15px;
}

.sidebar a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.sidebar a:hover{
  background:red;
}

.content{
  margin-left:230px;
  padding:20px;
}

.card{
  background:#1f2937;
  color:white;
  border-radius:12px;
}

.table{
  background:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>🩸 Blood Bank</h4>
  <a href="#">Dashboard</a>
  <a href="request.html">Requests</a>
  <a href="/logout">Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<h3>👋 Welcome Admin</h3>

<!-- SEARCH -->
<div class="mb-3">
  <input id="searchInput" class="form-control" placeholder="Search donor by name, city, blood group..." onkeyup="searchDonor()">
</div>

<!-- TABLE -->
<div class="table-responsive">
<table class="table table-bordered text-center">
<thead class="table-danger">
<tr>
  <th>Name</th>
  <th>Blood</th>
  <th>Phone</th>
  <th>City</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>
</table>
</div>

</div>

<script>
let isAdmin = false;

// check admin
fetch('/me')
.then(res => res.json())
.then(data => {
  isAdmin = data.user === "admin";
});

// load donors
function loadDonors(){
  fetch('/donors')
  .then(res => res.json())
  .then(renderTable);
}

// render
function renderTable(data){
  const table = document.getElementById("donorTable");
  table.innerHTML = "";

  if(data.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="5" class="text-danger">No donors found 😔</td>
      </tr>
    `;
    return;
  }

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.bloodGroup}</td>
        <td>${d.phone}</td>
        <td>${d.city}</td>
        <td>
          ${isAdmin ? `
            <button onclick="deleteDonor('${d._id}')" class="btn btn-danger btn-sm">
              Delete
            </button>
          ` : `<span class="text-muted">View</span>`}
        </td>
      </tr>
    `;
  });
}

// search
function searchDonor(){
  const q = searchInput.value;

  if(!q){
    loadDonors();
    return;
  }

  fetch('/search?q=' + q)
  .then(res => res.json())
  .then(renderTable);
}

// delete
function deleteDonor(id){
  fetch('/delete-donor/' + id, { method:'DELETE' })
  .then(() => loadDonors());
}

// init
loadDonors();
</script>

</body>
</html>
