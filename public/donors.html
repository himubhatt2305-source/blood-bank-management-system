<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Donors</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-layout">

    <aside class="sidebar">

        <div>

            <h2 class="sidebar-logo">
                🩸 ADMIN
            </h2>

            <div class="sidebar-links">

                <a href="donors.html" class="active-link">
                    Donors
                </a>

                <a href="requests.html">
                    Requests
                </a>

            </div>

        </div>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </aside>

    <main class="admin-main">

        <div class="page-top">

            <h1>
                Donor Inventory
            </h1>

            <p>
                Manage all registered blood donors
            </p>

        </div>

        <div class="table-glass">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Blood Group</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="list"></tbody>

            </table>

        </div>

    </main>

</div>

<script>

async function getDonors(){

    try{

        const res =
        await fetch('/donors-list');

        const data =
        await res.json();

        const table =
        document.getElementById('list');

        if(!data.length){

            table.innerHTML =
            `
            <tr>
                <td colspan="5" style="text-align:center;padding:30px;">
                    No donors found
                </td>
            </tr>
            `;

            return;

        }

        table.innerHTML =
        data.map(d => `

        <tr>

            <td>
                ${d.name || 'Unknown'}
            </td>

            <td>

                <span class="blood-badge">

                    ${d.bloodGroup || 'N/A'}

                </span>

            </td>

            <td>
                ${d.phone || '-'}
            </td>

            <td>
                ${d.city || '-'}
            </td>

            <td>

                <button
                class="delete-btn"
                onclick="deleteDonor('${d._id}')">

                    Delete

                </button>

            </td>

        </tr>

        `).join('');

    }

    catch(err){

        console.log(err);

    }

}

async function deleteDonor(id){

    const ok =
    confirm("Delete donor permanently?");

    if(!ok) return;

    try{

        const res =
        await fetch(`/delete-donor/${id}`,{
            method:'DELETE'
        });

        const data =
        await res.json();

        if(data.success){

            getDonors();

        }

        else{

            alert("Delete failed");

        }

    }

    catch(err){

        alert("Server error");

    }

}

window.onload = getDonors;

</script>

</body>
</html>
