<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Blood Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-center py-4">🩸 Blood Bank</h4>
    <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a href="requests.html"><i class="fas fa-hand-holding-medical me-2"></i> Requests</a>
    <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>System Overview</h2>
        <button onclick="document.body.classList.toggle('light')" class="btn btn-outline-light btn-sm">🌓 Mode</button>
    </div>

    <!-- STATS -->
    <div class="row">
        <div class="col-md-3"><div class="card bg-danger"><h3>0</h3><p>Donors</p></div></div>
        <div class="col-md-3"><div class="card bg-primary"><h3>0</h3><p>Requests</p></div></div>
        <div class="col-md-3"><div class="card bg-success"><h3>0</h3><p>Approved</p></div></div>
        <div class="col-md-3"><div class="card bg-warning text-dark"><h3>0</h3><p>Pending</p></div></div>
    </div>

    <input id="liveSearch" class="form-control mb-4" placeholder="Search donors by name or city...">

    <div class="table-responsive shadow">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Blood</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="donorTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Keeping your logic but wrapping it for stability
    async function loadDashboard() {
        try {
            const userRes = await fetch('/me');
            const user = await userRes.json();
            const isAdmin = user.user === "admin";

            const donorRes = await fetch('/donors');
            const donors = await donorRes.json();
            
            renderTable(donors, isAdmin);
        } catch (err) {
            console.error("Failed to load dashboard data", err);
        }
    }

    function renderTable(data, isAdmin) {
        const tbody = document.getElementById('donorTable');
        tbody.innerHTML = data.map(d => `
            <tr>
                <td>${d.name}</td>
                <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
                <td>${d.phone}</td>
                <td>${d.city}</td>
                <td>
                    ${isAdmin ? `<button class="btn btn-sm btn-outline-danger" onclick="confirmDelete('${d._id}')">Delete</button>` : 'View Only'}
                </td>
            </tr>
        `).join('');
    }

    function confirmDelete(id) {
        Swal.fire({
            title: 'Delete Donor?',
            text: "This cannot be undone!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            confirmButtonText: 'Yes, delete it!'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/delete-donor/' + id, { method: 'DELETE' }).then(() => {
                    Swal.fire('Deleted!', 'Donor has been removed.', 'success');
                    loadDashboard();
                });
            }
        });
    }

    loadDashboard();
</script>
</body>
</html>
