<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="sidebar">
        <h4 class="text-center py-4">🩸 Blood Bank</h4>
        <a href="donors.html">Dashboard</a>
        <a href="requests.html">Requests</a>
        <a href="/logout" style="color:#ff416c; margin-top:50px;">Logout</a>
    </div>

    <div class="content" style="margin-left: 260px; padding: 40px;">
        <h2>Management Dashboard</h2>

        <div class="table-container shadow-lg">
            <input id="liveSearch" class="form-control mb-3" placeholder="Search donors...">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Blood Group</th>
                            <th>Phone</th>
                            <th>City</th>
                            <th id="adminHeader" style="display:none;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="donorTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;

        async function init() {
            // 1. Fetch User Role
            const userRes = await fetch('/me');
            const userData = await userRes.json();
            isAdmin = (userData.user === "admin");
            if(isAdmin) document.getElementById('adminHeader').style.display = "table-cell";

            // 2. Load Donors IMMEDIATELY
            loadDonors();
        }

        function loadDonors() {
            fetch('/donors').then(r => r.json()).then(data => {
                const tbody = document.getElementById('donorTable');
                if(data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5'>No donors found.</td></tr>";
                    return;
                }
                tbody.innerHTML = data.map(d => `
                    <tr>
                        <td><b>${d.name}</b></td>
                        <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
                        <td>${d.phone}</td>
                        <td>${d.city}</td>
                        ${isAdmin ? `<td><button class='btn btn-sm btn-danger' onclick="deleteDonor('${d._id}')">Delete</button></td>` : ''}
                    </tr>
                `).join('');
            });
        }

        init();
    </script>
</body>
</html>
