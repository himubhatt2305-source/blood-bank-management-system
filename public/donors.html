<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Blood Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
<div id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h4 class="text-center py-4 fw-bold">🩸 Blood Bank</h4>
    <a href="donors.html"><i class="fas fa-columns me-2"></i> Dashboard</a>
    <a href="requests.html"><i class="fas fa-hand-holding-medical me-2"></i> Requests</a>
    <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold">Management Dashboard</h2>
        <button onclick="document.body.classList.toggle('light')" class="btn btn-sm btn-outline-light">🌓 Theme</button>
    </div>

    <!-- STATS -->
    <div class="row">
        <div class="col-md-3"><div class="card" style="background: linear-gradient(135deg, #ff416c, #ff4b2b);"><h3>0</h3><p>Donors</p></div></div>
        <div class="col-md-3"><div class="card" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);"><h3>0</h3><p>Requests</p></div></div>
        <div class="col-md-3"><div class="card" style="background: linear-gradient(135deg, #11998e, #38ef7d);"><h3>0</h3><p>Approved</p></div></div>
        <div class="col-md-3"><div class="card" style="background: linear-gradient(135deg, #f09819, #edde5d);"><h3>0</h3><p>Pending</p></div></div>
    </div>

    <div class="table-container shadow-lg">
        <input id="liveSearch" class="form-control mb-3" placeholder="🔍 Search donors...">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Blood Group</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th id="actionHeader" style="display: none;">Action</th>
                    </tr>
                </thead>
                <tbody id="donorTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let isAdmin = false;

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function loadData() {
        // Check User Role
        const userRes = await fetch('/me');
        const userData = await userRes.json();
        isAdmin = userData.user === "admin";

        if(isAdmin) document.getElementById('actionHeader').style.display = "table-cell";

        // Fetch Donors
        fetch('/donors').then(res => res.json()).then(data => {
            renderTable(data);
        });

        // Fetch Stats
        fetch('/requests').then(res => res.json()).then(data => {
            // Stats logic here (same as before)
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('donorTable');
        tbody.innerHTML = data.map(d => `
            <tr>
                <td><b>${d.name}</b></td>
                <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
                <td>${d.phone}</td>
                <td>${d.city}</td>
                ${isAdmin ? `
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteDonor('${d._id}')"><i class="fas fa-trash"></i></button>
                </td>` : ''}
            </tr>
        `).join('');
    }

    function deleteDonor(id) {
        Swal.fire({ title: 'Delete?', icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) fetch('/delete-donor/'+id, {method:'DELETE'}).then(()=>loadData());
        });
    }

    loadData();
</script>
</body>
</html>
