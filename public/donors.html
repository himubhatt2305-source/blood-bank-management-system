<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Donors</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

    <h4>
        🩸
    </h4>

    <a href="donors.html">
        Manage Donors
    </a>

    <a href="requests.html">
        Blood Requests
    </a>

    <a href="/logout">
        Logout
    </a>

</div>

<div class="content">

    <div class="glass-card">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div>

                <h2>
                    Registered Donors
                </h2>

                <p class="text-secondary">

                    Real-time blood donor inventory management

                </p>

            </div>

        </div>

        <div class="table-responsive">

            <table class="table-custom">

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Blood Group</th>

                        <th>Phone</th>

                        <th>City</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="list"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

async function getDonors(){

    const res =
    await fetch('/donors-list?t=' + Date.now());

    const data = await res.json();

    const table =
    document.getElementById("list");

    if(data.length === 0){

        table.innerHTML = `

        <tr>

            <td colspan="5">

                No Donors Found

            </td>

        </tr>

        `;

        return;
    }

    table.innerHTML = data.map(d => `

        <tr>

            <td>

                ${d.name || "Unknown"}

            </td>

            <td>

                <span class="badge-red">

                    ${d.bloodGroup || "N/A"}

                </span>

            </td>

            <td>

                ${d.phone || "N/A"}

            </td>

            <td>

                ${d.city || "Unknown"}

            </td>

            <td>

                <button
                onclick="deleteDonor('${d._id}')"
                class="action-btn delete-btn">

                    Delete

                </button>

            </td>

        </tr>

    `).join("");

}

async function deleteDonor(id){

    const confirmDelete =
    confirm("Delete donor permanently?");

    if(!confirmDelete) return;

    const res = await fetch(

        `/delete-donor/${id}`,

        {
            method:"DELETE"
        }

    );

    const result = await res.json();

    if(result.success){

        getDonors();

    } else {

        alert("Delete Failed");

    }

}

window.onload = getDonors;

</script>

</body>
</html>
