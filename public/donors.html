<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b');
  background-size: cover;
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 230px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  padding-top: 20px;
  transition: 0.3s;
}

.sidebar h4 {
  text-align: center;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 12px 20px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  background: red;
}

/* CONTENT */
.content {
  margin-left: 230px;
  padding: 20px;
  transition: 0.3s;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  text-align: center;
  padding: 20px;
  color: white;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* TABLE */
.table {
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

/* MOBILE */
.menu-btn {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

@media(max-width:768px){
  .sidebar {
    left: -230px;
  }

  .sidebar.active {
    left: 0;
  }

  .content {
    margin-left: 0;
  }

  .menu-btn {
    display: block;
  }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h4><i class="fa-solid fa-droplet"></i> Blood Bank</h4>

  <a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="requests.html"><i class="fa-solid fa-list"></i> Requests</a>
  <a href="#"><i class="fa-solid fa-user"></i> Donors</a>
  <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TOP BAR -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <span class="menu-btn" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </span>
    <h4>Dashboard</h4>
  </div>

  <!-- STATS -->
  <div class="row text-center">

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-users fa-2x"></i>
        <h4 id="totalDonors">0</h4>
        <p>Donors</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-notes-medical fa-2x"></i>
        <h4 id="totalRequests">0</h4>
        <p>Requests</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-check fa-2x"></i>
        <h4 id="approvedCount">0</h4>
        <p>Approved</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-clock fa-2x"></i>
        <h4 id="pendingCount">0</h4>
        <p>Pending</p>
      </div>
    </div>

  </div>

  <!-- FILTER -->
  <div class="d-flex justify-content-between mb-3">
    <select id="searchInput" class="form-select w-auto" onchange="searchDonor()">
      <option value="">Filter Blood</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-danger text-center">
        <tr>
          <th>Name</th>
          <th>Blood</th>
          <th>Phone</th>
          <th>City</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="donorTable"></tbody>
    </table>
  </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// SIDEBAR TOGGLE
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

// LOAD DATA
function loadDonors() {
  fetch('/donors')
  .then(res => res.json())
  .then(data => {
    totalDonors.innerText = data.length;
    renderTable(data);
  });
}

function loadStats() {
  fetch('/requests')
  .then(res => res.json())
  .then(data => {
    totalRequests.innerText = data.length;
    approvedCount.innerText = data.filter(r=>r.status==="Approved").length;
    pendingCount.innerText = data.filter(r=>r.status==="Pending").length;
  });
}

// TABLE
function renderTable(data){
  donorTable.innerHTML = "";

  data.forEach(d=>{
    donorTable.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>
        <button onclick="deleteDonor('${d._id}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    </tr>`;
  });
}

// DELETE
function deleteDonor(id){
  if(!confirm("Delete?")) return;

  fetch('/delete-donor/'+id,{method:"DELETE"})
  .then(()=>{
    loadDonors();
    loadStats();
  });
}

// SEARCH
function searchDonor(){
  const bg = searchInput.value;

  if(!bg) return loadDonors();

  fetch('/search?bloodGroup='+bg)
  .then(res=>res.json())
  .then(data=>renderTable(data));
}

// INIT
loadDonors();
loadStats();

</script>

</body>
</html>
