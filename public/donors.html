<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Blood Bank</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

<div class="sidebar" id="mySidebar">
  <button class="btn text-white d-lg-none" style="position:absolute; right:10px; top:10px;" onclick="toggleMenu()">
    <i class="fas fa-times"></i>
  </button>

  <h4 class="text-center py-4">🩸 Blood Bank</h4>

  <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
  <a href="requests.html"><i class="fas fa-list me-2"></i> Requests</a>
  <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<div class="content">
  <h2 class="fw-bold mb-4">Management Dashboard</h2>

  <!-- CARDS -->
  <div class="row">
    <div class="col-6 col-md-3"><div class="card-stat card-red"><h2 id="totalDonors">0</h2><p>Donors</p></div></div>
    <div class="col-6 col-md-3"><div class="card-stat card-blue"><h2 id="totalRequests">0</h2><p>Requests</p></div></div>
    <div class="col-6 col-md-3"><div class="card-stat card-green"><h2 id="approvedCount">0</h2><p>Approved</p></div></div>
    <div class="col-6 col-md-3"><div class="card-stat card-yellow"><h2 id="pendingCount">0</h2><p>Pending</p></div></div>
  </div>

  <div class="table-container shadow">

    <!-- 🔥 NEW BLOOD SEARCH -->
    <select id="bloodSearch" class="form-select mb-3">
      <option value="">🔍 Select Blood Group</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>

    <div id="resultBox" class="mb-3"></div>

    <!-- ADMIN TABLE -->
    <div class="table-responsive" id="adminTable" style="display:none;">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Name</th>
            <th>Blood Group</th>
            <th>Phone</th>
            <th>City</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="donorTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

let isAdmin = false;

function toggleMenu() {
  document.getElementById("mySidebar").classList.toggle("active");
}

/* INIT */
async function start() {
  const res = await fetch('/me');
  const user = await res.json();

  isAdmin = (user.user === "admin");

  if(isAdmin){
    document.getElementById("adminTable").style.display = "block";
    loadDonors();
    loadStats();
  }
}

/* BLOOD SEARCH */
document.getElementById("bloodSearch").addEventListener("change", function () {
  const bg = this.value;
  const box = document.getElementById("resultBox");

  if (!bg) {
    box.innerHTML = "";
    return;
  }

  fetch(`/search-blood?bloodGroup=${bg}`)
    .then(res => res.json())
    .then(data => {

      if (data.available) {
        box.innerHTML = `
          <div class="alert alert-success text-center">
            ✅ Blood Available (${data.count} donors)
            <br><br>
            <a href="donate.html" class="btn btn-danger btn-sm">
              Request Blood
            </a>
          </div>
        `;
      } else {
        box.innerHTML = `
          <div class="alert alert-danger text-center">
            ❌ Blood Not Available
          </div>
        `;
      }

    });
});

/* ADMIN DATA */
function loadDonors() {
  fetch('/donors').then(r => r.json()).then(data => {
    document.getElementById('donorTable').innerHTML = data.map(d => `
      <tr>
        <td><b>${d.name}</b></td>
        <td><span class="badge bg-danger">${d.bloodGroup}</span></td>
        <td>${d.phone}</td>
        <td>${d.city}</td>
        <td>
          <button class="btn btn-sm btn-danger" onclick="deleteItem('${d._id}')">Delete</button>
        </td>
      </tr>
    `).join('');

    document.getElementById('totalDonors').innerText = data.length;
  });
}

function loadStats() {
  fetch('/requests').then(r => r.json()).then(data => {
    document.getElementById('totalRequests').innerText = data.length;
    document.getElementById('approvedCount').innerText = data.filter(r => r.status === "Approved").length;
    document.getElementById('pendingCount').innerText = data.filter(r => r.status === "Pending").length;
  });
}

function deleteItem(id){
  fetch('/delete-donor/'+id,{method:'DELETE'})
  .then(()=>{
    loadDonors();
  });
}

start();

</script>

</body>
</html>
