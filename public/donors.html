<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar" id="sidebar">
  <h4><i class="fa-solid fa-droplet text-danger"></i> Blood Bank</h4>

  <a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="request.html"><i class="fa-solid fa-list"></i> Requests</a>
  <a href="#"><i class="fa-solid fa-user"></i> Donors</a>
  <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<div class="content">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <span class="menu-btn" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </span>
    <h4>Dashboard</h4>
  </div>

  <!-- CARDS -->
  <div class="row text-center">

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-users"></i>
        <h4 id="totalDonors">0</h4>
        <p>Donors</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-notes-medical"></i>
        <h4 id="totalRequests">0</h4>
        <p>Requests</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-check"></i>
        <h4 id="approvedCount">0</h4>
        <p>Approved</p>
      </div>
    </div>

    <div class="col-6 col-md-3 mb-3">
      <div class="card">
        <i class="fa-solid fa-clock"></i>
        <h4 id="pendingCount">0</h4>
        <p>Pending</p>
      </div>
    </div>

  </div>

  <!-- FILTER -->
  <div class="mb-3">
    <select id="searchInput" class="form-select w-50" onchange="searchDonor()">
      <option value="">Filter Blood</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered text-center">
      <thead class="table-danger">
        <tr>
          <th>Name</th>
          <th>Blood</th>
          <th>Phone</th>
          <th>City</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="donorTable"></tbody>
    </table>
  </div>

</div>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function loadDonors(){
  fetch('/donors')
  .then(res=>res.json())
  .then(data=>{
    totalDonors.innerText=data.length;
    renderTable(data);
  });
}

function loadStats(){
  fetch('/requests')
  .then(res=>res.json())
  .then(data=>{
    totalRequests.innerText=data.length;
    approvedCount.innerText=data.filter(r=>r.status==="Approved").length;
    pendingCount.innerText=data.filter(r=>r.status==="Pending").length;
  });
}

function renderTable(data){
  donorTable.innerHTML="";
  data.forEach(d=>{
    donorTable.innerHTML+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>
        <button onclick="deleteDonor('${d._id}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    </tr>`;
  });
}

function deleteDonor(id){
  if(!confirm("Delete?")) return;
  fetch('/delete-donor/'+id,{method:"DELETE"})
  .then(()=>{loadDonors();loadStats();});
}

function searchDonor(){
  const bg=searchInput.value;
  if(!bg) return loadDonors();

  fetch('/search?bloodGroup='+bg)
  .then(res=>res.json())
  .then(data=>renderTable(data));
}

loadDonors();
loadStats();
</script>

</body>
</html>
