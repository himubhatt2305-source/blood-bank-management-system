<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donors</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

.sidebar{
  position:fixed;
  width:220px;
  height:100%;
  background:#111827;
  padding:15px;
}

.sidebar a{
  display:block;
  color:white;
  padding:10px;
  text-decoration:none;
  border-radius:8px;
}

.sidebar a:hover{
  background:red;
}

.content{
  margin-left:230px;
  padding:20px;
}

.table{
  background:white;
}

.btn-tab{
  margin:5px;
}
</style>
</head>

<body>

<!-- SIDEBAR (UNCHANGED STYLE IDEA) -->
<div class="sidebar">
  <h4>🩸 Blood Bank</h4>
  <a href="#">Dashboard</a>
  <a href="request.html">Requests</a>
  <a href="/logout">Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<h3>👋 Donors Dashboard</h3>

<!-- SEARCH + TABS -->
<div class="mb-3">

  <input id="searchInput"
  class="form-control mb-2"
  placeholder="Search donor..."
  onkeyup="searchDonor()">

  <button class="btn btn-primary btn-tab" onclick="loadDonors()">All</button>
  <button class="btn btn-danger btn-tab" onclick="filterGender('Male')">👨 Male</button>
  <button class="btn btn-warning btn-tab" onclick="filterGender('Female')">👩 Female</button>

</div>

<!-- TABLE -->
<div class="table-responsive">
<table class="table table-bordered text-center">

<thead class="table-danger">
<tr>
  <th>Name</th>
  <th>Blood</th>
  <th>Phone</th>
  <th>City</th>
  <th>Gender</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>
</div>

</div>

<script>

let isAdmin = false;

fetch('/me')
.then(r=>r.json())
.then(d=>{
  isAdmin = d.user === "admin";
});

function loadDonors(){
  fetch('/donors')
  .then(r=>r.json())
  .then(render);
}

function render(data){
  let table = document.getElementById("donorTable");
  table.innerHTML = "";

  if(data.length === 0){
    table.innerHTML = `<tr><td colspan="6">No donors found</td></tr>`;
    return;
  }

  data.forEach(d=>{
    table.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.bloodGroup}</td>
      <td>${d.phone}</td>
      <td>${d.city}</td>
      <td>${d.gender || "-"}</td>
      <td>
        ${isAdmin ? `
          <button class="btn btn-danger btn-sm"
          onclick="deleteDonor('${d._id}')">Delete</button>
        ` : `<span>View</span>`}
      </td>
    </tr>
    `;
  });
}

function searchDonor(){
  let q = searchInput.value;

  if(!q){
    loadDonors();
    return;
  }

  fetch('/search?q=' + q)
  .then(r=>r.json())
  .then(render);
}

function filterGender(g){
  fetch('/filter-gender?gender=' + g)
  .then(r=>r.json())
  .then(render);
}

function deleteDonor(id){
  fetch('/delete-donor/' + id, {method:'DELETE'})
  .then(()=>loadDonors());
}

loadDonors();

</script>

</body>
</html>
