<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">Dashboard</h4>
        <a href="donors.html">Donors List</a>
        <a href="requests.html">Blood Requests</a>
        <a href="/logout">Logout</a>
    </div>
    <div class="content">
        <div class="card-box">
            <h3>🩸 Donor Management</h3>
            <table class="table table-dark mt-4">
                <thead><tr><th>Name</th><th>Group</th><th>Phone</th><th>City</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
    <script>
        fetch('/donors-list').then(r=>r.json()).then(data => {
            document.getElementById('list').innerHTML = data.map(d => `
                <tr><td>${d.name}</td><td>${d.bloodGroup}</td><td>${d.phone}</td><td>${d.city}</td></tr>
            `).join('');
        });
    </script>
</body>
</html>
