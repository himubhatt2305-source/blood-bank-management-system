<!DOCTYPE html>
<html>
<head>
  <title>Blood Requests</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f6fa;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .badge {
      padding: 6px 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="text-danger">Blood Requests</h2>
    <a href="/donors.html" class="btn btn-dark">Back</a>
  </div>

  <div class="card p-3">
    <table class="table table-bordered">
      <thead class="table-danger">
        <tr>
          <th>Name</th>
          <th>Blood Group</th>
          <th>City</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="requestTable"></tbody>
    </table>
  </div>

</div>

<script>

// LOAD REQUESTS
function loadRequests() {
  fetch('/requests')
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("requestTable");
    table.innerHTML = "";

    data.forEach(r => {

      let badgeClass = "bg-warning text-dark";

if (r.status === "Approved") badgeClass = "bg-success";
if (r.status === "Rejected") badgeClass = "bg-danger";
      table.innerHTML += `
        <tr>
          <td>${r.name}</td>
          <td>${r.bloodGroup}</td>
          <td>${r.city}</td>

          <td>
            <span class="badge ${badgeClass}">
              ${r.status}
            </span>
          </td>

          <td>
            <button onclick="approve('${r._id}')" class="btn btn-success btn-sm">Accept</button>
            <button onclick="reject('${r._id}')" class="btn btn-danger btn-sm">Reject</button>
          </td>
        </tr>
      `;
    });

  });
}

// APPROVE
function approve(id) {
  fetch(`/accept-request/${id}`, { method: "PUT" })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    loadRequests();
  });
}

// REJECT
function reject(id) {
  fetch(`/reject-request/${id}`, { method: "PUT" })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    loadRequests();
  });
}

// INITIAL LOAD
loadRequests();

</script>

</body>
</html>
