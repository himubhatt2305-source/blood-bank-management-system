<!DOCTYPE html>
<html lang="en">
<head>
    <title>Request Blood | Patient</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-with-bg d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="table-container col-md-5 p-4 shadow-lg" style="border-radius: 20px;">
    <h3 class="text-center mb-4">🩸 Request Blood</h3>
    <div id="successMsg" class="alert alert-success text-center" style="display:none;">✅ Request submitted successfully!</div>
    <form id="requestForm">
        <input type="text" name="name" class="form-control mb-3" placeholder="Patient Name" required>
        <select name="bloodGroup" class="form-select mb-3" required>
            <option value="">Select Blood Group</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
        <input type="text" name="city" class="form-control mb-3" placeholder="City" required>
        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Submit Request</button>
    </form>
</div>

<script>
    document.getElementById("requestForm").addEventListener("submit", function(e){
        e.preventDefault();
        const data = Object.fromEntries(new FormData(this));
        fetch('/add-request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            document.getElementById("successMsg").style.display = "block";
            this.reset();
            setTimeout(() => { document.getElementById("successMsg").style.display = "none"; }, 3000);
        });
    });
</script>
</body>
</html>
