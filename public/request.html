<!DOCTYPE html>
<html>
<head>
  <title>Blood Requests</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark p-3">
  <div class="container">
    <span class="navbar-brand">
      <i class="fa-solid fa-list text-danger"></i> Blood Requests
    </span>
    <a href="donors.html" class="btn btn-light btn-sm">Back</a>
  </div>
</nav>

<div class="container mt-4">

  <div class="glass">

    <h4 class="mb-3">Requests List</h4>

    <div class="table-responsive">
      <table class="table table-bordered text-center">
        <thead>
          <tr>
            <th>Name</th>
            <th>Blood</th>
            <th>City</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="requestTable"></tbody>

      </table>
    </div>

  </div>

</div>

<script>
fetch('/requests')
.then(res => res.json())
.then(data => {

  const table = document.getElementById("requestTable");

  data.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.bloodGroup}</td>
        <td>${r.city}</td>
        <td>${r.status || "Pending"}</td>
        <td>
          <button onclick="approve('${r._id}')" class="btn btn-success btn-sm">✔</button>
          <button onclick="reject('${r._id}')" class="btn btn-danger btn-sm">✖</button>
        </td>
      </tr>
    `;
  });
});

function approve(id){
  fetch('/accept-request/' + id, { method:'PUT' })
  .then(()=>location.reload());
}

function reject(id){
  fetch('/reject-request/' + id, { method:'PUT' })
  .then(()=>location.reload());
}
</script>

</body>
</html>
