<!DOCTYPE html>
<html>
<head>
  <title>Request Blood</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh">

  <div class="glass col-md-5">

    <h3 class="text-center mb-4">🩸 Request Blood</h3>
    <div id="successMsg" class="alert alert-success text-center" style="display:none;">
        ✅ Request submitted successfully!
    </div>
    <form id="requestForm">

  <input type="text" name="name" class="form-control mb-3" placeholder="Patient Name" required>

  <select name="bloodGroup" class="form-select mb-3" required>
    <option value="">Select Blood Group</option>
    <option>A+</option><option>A-</option>
    <option>B+</option><option>B-</option>
    <option>O+</option><option>O-</option>
    <option>AB+</option><option>AB-</option>
  </select>

  <input type="text" name="city" class="form-control mb-3" placeholder="City" required>

  <button class="btn btn-danger w-100">Submit Request</button>

</form>

  </div>

</div>
<script>
const form = document.getElementById("requestForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch('/add-request', {
    method: 'POST',
    body: formData
  })
  .then(()=>{
    successMsg.style.display = "block";
    form.reset();

    setTimeout(()=>{
      successMsg.style.display = "none";
    }, 3000);
  });
});
</script>

</body>
</html>
