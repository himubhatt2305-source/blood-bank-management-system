<!DOCTYPE html>
<html>

<head>

<title>Emergency Blood Request</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="d-flex justify-content-center align-items-center"
style="min-height:100vh; background:#0f172a;">

<div class="glass-card" style="width:100%; max-width:500px;">

    <h2 class="text-center mb-4 fw-bold">
        🩸 Emergency Blood Request
    </h2>

    <form id="requestForm">

        <label class="form-label">
            Patient Name
        </label>

        <input
        type="text"
        name="patientName"
        class="form-control"
        placeholder="Enter Patient Name"
        required>

        <label class="form-label">
            Blood Group
        </label>

        <select
        name="bloodGroup"
        class="form-select"
        required>

            <option value="">
                Select Blood Group
            </option>

            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>

        </select>

        <label class="form-label">
            Hospital City
        </label>

        <input
        type="text"
        name="city"
        class="form-control"
        placeholder="Enter City"
        required>

        <label class="form-label">
            Contact Number
        </label>

        <input
        type="text"
        name="phone"
        class="form-control"
        placeholder="Enter Phone Number"
        required>

        <button
        type="submit"
        class="btn btn-danger w-100 py-3 mt-3"
        id="submitBtn">

            Submit Emergency Request

        </button>

        <div class="text-center mt-3">

            <a href="index.html" class="text-white-50">

                ← Back to Home

            </a>

        </div>

    </form>

</div>

<script>

document.getElementById("requestForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const btn =
    document.getElementById("submitBtn");

    btn.disabled = true;

    btn.innerText = "Submitting...";

    const data =
    Object.fromEntries(new FormData(this));

    try {

        await fetch('/add-request', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json'

            },

            body: JSON.stringify(data)

        });

        alert("Request Submitted Successfully");

        this.reset();

    } catch(err) {

        alert("Submission Failed");

    }

    btn.disabled = false;

    btn.innerText =
    "Submit Emergency Request";

});

</script>

</body>
</html>
