<!DOCTYPE html>
<html>
<head>
  <title>Blood Requests</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f3f6;
    }

    .container {
      margin-top: 20px;
    }

    @media(max-width:600px){
      .table th, .table td {
        font-size: 12px;
        padding: 6px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h4 class="text-danger">Blood Requests</h4>

  <a href="donors.html" class="btn btn-dark btn-sm mb-2">⬅ Back</a>

  <table class="table table-bordered">
    <thead class="table-danger">
      <tr>
        <th>Name</th>
        <th>Blood Group</th>
        <th>City</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="reqTable"></tbody>
  </table>
</div>

<script>
fetch('/requests')
.then(res => res.json())
.then(data => {
  const table = document.getElementById("reqTable");

  data.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.bloodGroup}</td>
        <td>${r.city}</td>
        <td>${r.status}</td>
        <td>
          <button onclick="approve('${r._id}')" class="btn btn-success btn-sm">Approve</button>
          <button onclick="reject('${r._id}')" class="btn btn-danger btn-sm">Reject</button>
        </td>
      </tr>
    `;
  });
});

function approve(id){
  fetch('/accept-request/'+id,{method:'PUT'}).then(()=>location.reload());
}

function reject(id){
  fetch('/reject-request/'+id,{method:'PUT'}).then(()=>location.reload());
}
</script>

</body>
</html>
