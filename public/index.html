<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blood Bank Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
overflow-x:hidden;
color:white;
}

/* NAVBAR */
.navbar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px 30px;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.navbar-brand{
font-size:28px;
font-weight:700;
color:white !important;
}

.nav-link{
color:white !important;
margin-left:20px;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:120px 8%;
}

.hero-left h1{
font-size:60px;
font-weight:700;
}

.hero-left span{
color:#ff4d6d;
}

.hero-card{
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:25px;
}

/* STOCK */
.stock-section{
padding:80px 8%;
}

.stock-card{
background:rgba(255,255,255,0.06);
padding:30px;
border-radius:25px;
text-align:center;
}

/* STATS */
.stats{
padding:80px 8%;
}

.stat-card{
background:rgba(255,255,255,0.06);
padding:40px;
border-radius:25px;
text-align:center;
}

.footer{
padding:30px;
text-align:center;
background:#020617;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container-fluid">

<a class="navbar-brand">🩸 Blood Bank</a>

<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="donate.html">Donate</a></li>
<li class="nav-item"><a class="nav-link" href="request.html">Request</a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Admin</a></li>
</ul>
</div>

</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container">
<div class="row align-items-center">

<div class="col-lg-6 hero-left">
<h1>Donate Blood <br><span>Save Lives ❤️</span></h1>
<p>One donation can save multiple lives.</p>
</div>

<div class="col-lg-6">
<div class="hero-card">

<h3 class="text-center">🔍 Search Blood</h3>

<input type="text" id="bloodInput" class="form-control mt-3" placeholder="Enter Blood Group">

<button onclick="checkBlood()" class="btn btn-danger w-100 mt-3">
Check Availability
</button>

<div id="result" class="mt-3 text-center"></div>

</div>
</div>

</div>
</div>
</section>

<!-- BLOOD STOCK -->
<section class="stock-section">
<h1 class="text-center mb-5">🩸 Blood Availability</h1>

<div class="container">
<div class="row g-4">

<div class="col-6 col-md-3">
<div class="stock-card">
<h2>A+</h2>
<p id="Apos">0 Units</p>
</div>
</div>

<div class="col-6 col-md-3">
<div class="stock-card">
<h2>B+</h2>
<p id="Bpos">0 Units</p>
</div>
</div>

<div class="col-6 col-md-3">
<div class="stock-card">
<h2>O+</h2>
<p id="Opos">0 Units</p>
</div>
</div>

<div class="col-6 col-md-3">
<div class="stock-card">
<h2>AB+</h2>
<p id="ABpos">0 Units</p>
</div>
</div>

</div>
</div>
</section>

<!-- STATS -->
<section class="stats">

<div class="container">
<div class="row g-4">

<div class="col-md-4">
<div class="stat-card">
<h2 id="donorCount">0</h2>
<p>Total Donors</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-card">
<h2 id="requestCount">0</h2>
<p>Total Requests</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-card">
<h2>24/7</h2>
<p>Emergency</p>
</div>
</div>

</div>
</div>

</section>

<!-- FOOTER -->
<div class="footer">
© 2026 Blood Bank System
</div>

<!-- SCRIPT -->
<script>

/* LOAD DONOR SUMMARY */
fetch('/donors')
.then(res => res.json())
.then(data => {

document.getElementById("donorCount").innerText = data.total;

document.getElementById("Apos").innerText = data.Apos + " Units";
document.getElementById("Bpos").innerText = data.Bpos + " Units";
document.getElementById("Opos").innerText = data.Opos + " Units";
document.getElementById("ABpos").innerText = data.ABpos + " Units";

});

/* REQUEST COUNT */
fetch('/requests')
.then(res => res.json())
.then(data => {
document.getElementById("requestCount").innerText = data.count;
});

/* BLOOD SEARCH */
function checkBlood(){

const result = document.getElementById("result");

const bg = document.getElementById("bloodInput").value.trim().toUpperCase();

fetch(`/search-blood?bloodGroup=${bg}`)
.then(res => res.json())
.then(data => {

if(data.available){
result.innerHTML = `<div class="alert alert-success">✅ Available (${data.count})</div>`;
}else{
result.innerHTML = `<div class="alert alert-danger">❌ Not Available</div>`;
}

});

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
