<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="logo">
        <h4 class="m-0 fw-bold">🩸 <span class="d-none d-sm-inline">Blood Bank</span></h4>
    </div>
    
    <div class="d-lg-none" onclick="toggleNav()">
        <i class="fas fa-bars text-white"></i>
    </div>

    <div class="nav-links" id="navLinks">
        <a href="donate.html">Donate Blood</a>
        <a href="request.html">Request Blood</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="admin-tag">Admin Panel</a>
    </div>
</nav>

<canvas id="bloodCanvas"></canvas>

<section class="hero container">
    <div class="row align-items-center w-100">
        <div class="col-lg-6 mb-5 mb-lg-0">
            <h1>Donate Blood <br><span>Save Lives ❤️</span></h1>
            <p class="mb-4">Your one donation can save multiple lives. Join our blood donation system.</p>
            <div class="d-flex flex-wrap gap-3">
                <a href="donate.html" class="btn-red">Donate Blood</a>
                <a href="request.html" class="btn-outline-light">Request Blood</a>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card-box">
                <h4 class="mb-4">🔍 Check Blood Availability</h4>
                <input id="bloodInput" class="form-control mb-3 py-2" placeholder="e.g. A+">
                <button onclick="checkBlood()" class="btn btn-danger w-100 py-2">Check Units</button>
                <div id="result" class="mt-3 fw-bold"></div>
            </div>
        </div>
    </div>
</section>

<section class="container mb-5">
    <div class="row g-3">
        <div class="col-6 col-md-3"><div class="stock-card a-plus"><h4>A+</h4><p id="Apos">0 Units</p></div></div>
        <div class="col-6 col-md-3"><div class="stock-card b-plus"><h4>B+</h4><p id="Bpos">0 Units</p></div></div>
        <div class="col-6 col-md-3"><div class="stock-card o-plus"><h4>O+</h4><p id="Opos">0 Units</p></div></div>
        <div class="col-6 col-md-3"><div class="stock-card ab-plus"><h4>AB+</h4><p id="ABpos">0 Units</p></div></div>
    </div>
</section>

<script>
    /* 3D CANVAS PARTICLES */
    const canvas = document.getElementById('bloodCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 70; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 1, dx: (Math.random() - 0.5) * 1.5,
                dy: (Math.random() - 0.5) * 1.5, alpha: Math.random() * 0.5 + 0.1
            });
        }
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 77, 109, ${p.alpha})`; ctx.fill();
            p.x += p.dx; p.y += p.dy;
            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init); init(); draw();

    /* API CALLS */
    fetch("/donors").then(r=>r.json()).then(d=>{
        document.getElementById("Apos").innerText=d.Apos+" Units";
        document.getElementById("Bpos").innerText=d.Bpos+" Units";
        document.getElementById("Opos").innerText=d.Opos+" Units";
        document.getElementById("ABpos").innerText=d.ABpos+" Units";
    });

    function checkBlood(){
        const bg = document.getElementById("bloodInput").value.toUpperCase();
        fetch("/search-blood?bloodGroup="+bg).then(r=>r.json()).then(data=>{
            document.getElementById("result").innerHTML = data.available ? "✅ Blood Available" : "❌ Not Available";
        });
    }
</script>
</body>
</html>
