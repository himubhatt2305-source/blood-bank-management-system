<!DOCTYPE html>
<html>
<head>
  <title>Blood Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      color: white;
    }

    .btn-custom {
      border-radius: 25px;
      padding: 10px;
      margin: 8px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="main-box">
  <h3>🩸 Blood Bank System</h3>
  <p>Donate Blood ❤️ Save Lives</p>

  <a href="donors.html" class="btn btn-light btn-custom">🔍 Find Donors</a>
  <a href="donate.html" class="btn btn-outline-light btn-custom">❤️ Donate Blood</a>
  <a href="request.html" class="btn btn-danger btn-custom">🩸 Request Blood</a>
</div>

</body>
</html>
