<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Bank | Save Lives</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar-custom">
        <div class="logo"><h4>🩸 Blood Bank</h4></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="donate.html">Donate</a>
            <a href="request.html">Request</a>
            <a href="login.html">Admin</a>
        </div>
    </nav>

    <div class="hero container">
        <div class="row w-100">
            <div class="col-md-6">
                <h1>Donate Blood <br><span style="color:red;">Save Lives ❤️</span></h1>
                <p>Your one donation can save up to three lives. Help us build a stronger community.</p>
                <div class="mt-4">
                    <a href="donate.html" class="btn btn-danger btn-lg me-2">Donate Now</a>
                    <a href="request.html" class="btn btn-outline-light btn-lg">Emergency Request</a>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="row g-3">
                    <div class="col-12">
                        <div class="stock-card total-card">
                            <h2 id="total-d">0</h2>
                            <p>Registered Lifesavers</p>
                        </div>
                    </div>
                    <div class="col-6"><div class="stock-card a-plus"><h2 id="a-c">0</h2><p>A+ Donors</p></div></div>
                    <div class="col-6"><div class="stock-card b-plus"><h2 id="b-c">0</h2><p>B+ Donors</p></div></div>
                    <div class="col-6"><div class="stock-card o-plus"><h2 id="o-c">0</h2><p>O+ Donors</p></div></div>
                    <div class="col-6"><div class="stock-card ab-plus"><h2 id="ab-c">0</h2><p>AB+ Donors</p></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch('/dashboard-stats');
            const data = await res.json();
            document.getElementById('total-d').innerText = data.total;
            document.getElementById('a-c').innerText = data.Apos;
            document.getElementById('b-c').innerText = data.Bpos;
            document.getElementById('o-c').innerText = data.Opos;
            document.getElementById('ab-c').innerText = data.ABpos;
        }
        window.onload = loadStats;
    </script>
</body>
</html>
