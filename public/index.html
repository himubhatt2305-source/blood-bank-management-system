<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blood Bank Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Poppins;
}

/* HERO STYLE RESTORED */
.hero{
padding:120px 8%;
display:flex;
align-items:center;
min-height:100vh;
}

.hero h1{
font-size:60px;
font-weight:700;
}

.hero span{
color:#ff4d6d;
}

.hero-card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
}

.btn-red{
background:#ff1744;
color:white;
border:none;
}

.btn-red:hover{
background:#ff4d6d;
}

.stock-card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:15px;
text-align:center;
}

.stat{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:15px;
text-align:center;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="container">

<div class="row">

<div class="col-md-6">

<h1>Donate Blood <br><span>Save Lives ❤️</span></h1>

<p>One donation can save multiple lives.</p>

<a href="donate.html" class="btn btn-red">Become Donor</a>
<a href="request.html" class="btn btn-outline-light ms-2">Request Blood</a>

</div>

<div class="col-md-6">

<div class="hero-card">

<h3>Check Blood Availability</h3>

<input id="bloodInput" class="form-control mt-3" placeholder="Enter Blood Group">

<button onclick="checkBlood()" class="btn btn-red w-100 mt-3">Check</button>

<div id="result" class="mt-3"></div>

</div>

</div>

</div>

</div>

</section>

<!-- STOCK -->
<section class="container mt-5">

<div class="row g-3 text-center">

<div class="col-md-3 stock-card">
<h3>A+</h3>
<p id="Apos">0</p>
</div>

<div class="col-md-3 stock-card">
<h3>B+</h3>
<p id="Bpos">0</p>
</div>

<div class="col-md-3 stock-card">
<h3>O+</h3>
<p id="Opos">0</p>
</div>

<div class="col-md-3 stock-card">
<h3>AB+</h3>
<p id="ABpos">0</p>
</div>

</div>

</section>

<!-- STATS -->
<section class="container mt-5 text-center">

<div class="row g-3">

<div class="col-md-6 stat">
<h2 id="donorCount">0</h2>
<p>Total Donors</p>
</div>

<div class="col-md-6 stat">
<h2 id="requestCount">0</h2>
<p>Total Requests</p>
</div>

</div>

</section>

<script>

/* LOAD DONORS */
fetch("/donors")
.then(r=>r.json())
.then(d=>{
document.getElementById("donorCount").innerText=d.total;
document.getElementById("Apos").innerText=d.Apos;
document.getElementById("Bpos").innerText=d.Bpos;
document.getElementById("Opos").innerText=d.Opos;
document.getElementById("ABpos").innerText=d.ABpos;
});

/* REQUEST */
fetch("/requests")
.then(r=>r.json())
.then(d=>{
document.getElementById("requestCount").innerText=d.count;
});

/* SEARCH */
function checkBlood(){

const bg=document.getElementById("bloodInput").value.toUpperCase();

fetch("/search-blood?bloodGroup="+bg)
.then(r=>r.json())
.then(data=>{

if(data.available){
document.getElementById("result").innerHTML="✅ Available";
}else{
document.getElementById("result").innerHTML="❌ Not Available";
}

});

}

</script>

</body>
</html>
