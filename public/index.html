<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .navbar-custom {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #111827;
            align-items: center;
        }

        .nav-links a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        .hero {
            padding: 60px 20px;
        }

        .card-box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
        }

        .btn-red {
            background: #ff1744;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .stock-card {
            padding: 20px;
            margin: 10px;
            border-radius: 15px;
            background: #1f2937;
        }

        .footer-license {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background: #111827;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-custom">
        <div class="logo">
            <h4>🩸 Blood Bank</h4>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="donate.html">Donate</a>
            <a href="request.html">Request</a>
            <a href="login.html">Admin</a>
        </div>
    </nav>

    <!-- HERO -->
    <div class="hero container">
        <div class="row w-100">

            <div class="col-md-6">
                <h1>Donate Blood <br><span style="color:red;">Save Lives ❤️</span></h1>
                <p>Your one donation can save multiple lives.</p>

                <a href="donate.html" class="btn btn-danger">Donate Now</a>
                <a href="request.html" class="btn btn-outline-light">Emergency</a>
            </div>

            <div class="col-md-6">
                <div class="card-box">
                    <h4>🔍 Check Availability</h4>

                    <input type="text" id="checkBG" class="form-control" placeholder="e.g. A+">

                    <button onclick="search()" class="btn-red">Check Units</button>

                    <p id="res" class="mt-3"></p>
                </div>
            </div>

        </div>
    </div>

    <!-- STOCK -->
    <div class="container pb-5">
        <div class="row text-center">

            <div class="col-md-3">
                <div class="stock-card">
                    <h3>A+</h3>
                    <p id="a-c">0 Units</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stock-card">
                    <h3>B+</h3>
                    <p id="b-c">0 Units</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stock-card">
                    <h3>O+</h3>
                    <p id="o-c">0 Units</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stock-card">
                    <h3>AB+</h3>
                    <p id="ab-c">0 Units</p>
                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer-license">
        <p>MIT License | Blood Bank System</p>
    </footer>

    <!-- SCRIPT -->
    <script>
async function loadDonors() {
  try {
    const res = await fetch('/donors');
    const data = await res.json();

    console.log("RAW DATA:", data);

    if (!Array.isArray(data)) {
      console.error("Invalid API response");
      return;
    }

    const clean = (v) => (v || "").toString().trim().toUpperCase();

    const A = data.filter(d => clean(d.bloodGroup) === "A+").length;
    const B = data.filter(d => clean(d.bloodGroup) === "B+").length;
    const O = data.filter(d => clean(d.bloodGroup) === "O+").length;
    const AB = data.filter(d => clean(d.bloodGroup) === "AB+").length;

    const aEl = document.getElementById("a-c");
    const bEl = document.getElementById("b-c");
    const oEl = document.getElementById("o-c");
    const abEl = document.getElementById("ab-c");

    if (aEl) aEl.innerText = A + " Units";
    if (bEl) bEl.innerText = B + " Units";
    if (oEl) oEl.innerText = O + " Units";
    if (abEl) abEl.innerText = AB + " Units";

  } catch (err) {
    console.error("Frontend Error:", err);
  }
}

loadDonors();
</script>
</body>

</html>
