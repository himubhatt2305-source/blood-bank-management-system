<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar-custom">
        <div class="logo"><h4>🩸 Blood Bank</h4></div>
        <div class="nav-links"><a href="index.html">Home</a><a href="donate.html">Donate</a><a href="request.html">Request</a><a href="login.html">Admin</a></div>
    </nav>

    <div class="hero container">
        <div class="row w-100">
            <div class="col-md-6">
                <h1>Donate Blood <br><span>Save Lives ❤️</span></h1>
                <p>Your one donation can save multiple lives.</p>
                <div class="mt-4">
                    <a href="donate.html" class="btn btn-danger px-4 py-2 rounded-pill me-2">Donate Now</a>
                    <a href="request.html" class="btn btn-outline-light px-4 py-2 rounded-pill">Emergency</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card-box">
                    <h4>🔍 Check Availability</h4>
                    <input type="text" id="checkBG" placeholder="e.g. A+">
                    <button onclick="search()" class="btn-red">Check Units</button>
                    <p id="res" class="mt-3"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row text-center">
            <div class="col-md-3"><div class="stock-card a-plus"><h3>A+</h3><p id="a-c">0 Units</p></div></div>
            <div class="col-md-3"><div class="stock-card b-plus"><h3>B+</h3><p id="b-c">0 Units</p></div></div>
            <div class="col-md-3"><div class="stock-card o-plus"><h3>O+</h3><p id="o-c">0 Units</p></div></div>
            <div class="col-md-3"><div class="stock-card ab-plus"><h3>AB+</h3><p id="ab-c">0 Units</p></div></div>
        </div>
    </div>

    <footer class="footer-license">
        <p>MIT License | Copyright (c) 2026 himubhatt2305-source</p>
    </footer>

    <script>
        fetch('/donors-count').then(r=>r.json()).then(d=>{
            document.getElementById('a-c').innerText = d.Apos + " Units";
            document.getElementById('b-c').innerText = d.Bpos + " Units";
            document.getElementById('o-c').innerText = d.Opos + " Units";
            document.getElementById('ab-c').innerText = d.ABpos + " Units";
        });
    </script>
</body>
</html>
