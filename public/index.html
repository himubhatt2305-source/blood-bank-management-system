  <style>
    body {
      background: linear-gradient(135deg, #ff4d6d, #dc3545);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;

      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.25);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn-custom {
      border-radius: 30px;
      padding: 10px 25px;
      font-weight: 500;
    }

    .navbar {
      background: rgba(0,0,0,0.2) !important;
    }
  </style>
</head>
  <head>
  <link rel="stylesheet" href="style.css">
</head>

<nav class="navbar navbar-dark">

  </div>
</nav>

<!-- HERO SECTION -->
<div class="hero">
  <div class="box">

    <h1 class="fw-bold">Blood Bank Management System</h1>
    <p class="mb-4">Donate Blood ❤️ Save Lives</p>

    <div>
      <a href="donors.html" class="btn btn-light btn-custom m-2">Find Donors</a>
      <a href="donate.html" class="btn btn-outline-light btn-custom m-2">Donate Blood</a>
      <a href="request.html" class="btn btn-dark btn-custom m-2">Request Blood</a>
