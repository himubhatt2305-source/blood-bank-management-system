<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Blood Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
    }

    .login-box h3 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-control {
      margin-bottom: 15px;
    }

    .btn-login {
      width: 100%;
      background: #ff1744;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
    }

    .btn-login:hover {
      background: #e6003d;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <h3>Admin Login</h3>

    <input type="text" id="username" class="form-control" placeholder="Username">
    <input type="password" id="password" class="form-control" placeholder="Password">

    <button class="btn-login" onclick="login()">Login</button>

    <p id="msg" class="text-center mt-3"></p>

  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (!username || !password) {
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const data = await res.json();

        if (data.success) {

          document.getElementById("msg").innerText = "Login Success ✔";

          if (data.role === "admin") {
            window.location.href = "/index.html"; // admin dashboard
          } else {
            window.location.href = "/index.html";
          }

        } else {
          document.getElementById("msg").innerText = data.message;
        }

      } catch (err) {
        console.log(err);
        document.getElementById("msg").innerText = "Server error";
      }
    }
  </script>

</body>

</html>
