<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login - Blood Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-box { background: #111827; padding: 30px; border-radius: 15px; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
    .btn-login { width: 100%; background: #ff1744; color: white; border: none; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h3 class="text-center mb-4">Admin Login</h3>
    <input type="text" id="username" class="form-control mb-3" placeholder="Email Address">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>
    <p id="msg" class="text-center mt-3"></p>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");
      
      if (!username || !password) {
        msg.innerText = "Please fill all fields";
        return;
      }

      msg.innerText = "Authenticating...";

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          msg.style.color = "lime";
          msg.innerText = "Login Success ✔";
          window.location.href = "/donors.html";
        } else {
          msg.style.color = "red";
          msg.innerText = data.message;
        }
      } catch (err) {
        msg.innerText = "Server error. Try again.";
      }
    }
  </script>
</body>
</html>
