<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-page">

    <div class="modern-form-card login-card">

        <h1 class="form-title">
            🔐 Admin Login
        </h1>

        <p class="form-subtitle">
            Access Blood Bank Dashboard
        </p>

        <form id="loginForm">

            <div class="input-group">

                <label>
                    Email Address
                </label>

                <input
                type="text"
                name="username"
                placeholder="Enter admin email"
                required>

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                type="password"
                name="password"
                placeholder="Enter password"
                required>

            </div>

            <button type="submit" class="btn-red full-btn">
                Login
            </button>

        </form>

        <div class="back-home">

            <a href="index.html">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

<script>

document.getElementById('loginForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const data =
    Object.fromEntries(
        new FormData(this)
    );

    try{

        const res =
        await fetch('/login',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)

        });

        const result =
        await res.json();

        if(result.success){

            window.location.href =
            "donors.html";

        }

        else{

            alert(result.message || "Login Failed");

        }

    }

    catch(err){

        alert("Server Error");

    }

});

</script>

</body>
</html>
