<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card p-4 mx-auto" style="max-width:400px;">

    <h3 class="text-center text-danger">Admin Login</h3>

    <form action="/login" method="POST">

      <input type="text" name="username" class="form-control my-2" placeholder="Username" required>

      <input type="password" name="password" class="form-control my-2" placeholder="Password" required>

      <button class="btn btn-danger w-100 mt-2">Login</button>

    </form>

  </div>

</div>

</body>
</html>
