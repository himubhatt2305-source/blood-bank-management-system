<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manage Requests | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- BOOTSTRAP & ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center py-4">🩸 Blood Bank</h4>
    <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a href="requests.html"><i class="fas fa-list me-2"></i> Requests</a>
    <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">
    <h2 class="fw-bold mb-4">Blood Requests List</h2>

    <div class="table-container shadow-lg">
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Patient Name</th>
                        <th>Blood Group</th>
                        <th>City</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requestTable">
                    <!-- Data will load here via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// LOAD ALL REQUESTS
function loadRequests() {
    fetch('/requests')
    .then(res => res.json())
    .then(data => {
        const tableBody = document.getElementById("requestTable");
        tableBody.innerHTML = ""; // Clear table first

        data.forEach(r => {
            tableBody.innerHTML += `
                <tr>
                    <td><b>${r.name}</b></td>
                    <td><span class="badge bg-danger">${r.bloodGroup}</span></td>
                    <td>${r.city}</td>
                    <td>
                        <span class="badge ${r.status === 'Approved' ? 'bg-success' : (r.status === 'Rejected' ? 'bg-secondary' : 'bg-warning text-dark')}">
                            ${r.status || "Pending"}
                        </span>
                    </td>
                    <td>
                        <button onclick="approve('${r._id}')" class="btn btn-success btn-sm" title="Approve">
                            <i class="fas fa-check"></i>
                        </button>
                        <button onclick="reject('${r._id}')" class="btn btn-outline-danger btn-sm" title="Reject">
                            <i class="fas fa-times"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    });
}

// APPROVE FUNCTION
function approve(id){
    fetch('/accept-request/' + id, { method: 'PUT' })
    .then(() => loadRequests());
}

// REJECT FUNCTION
function reject(id){
    fetch('/reject-request/' + id, { method: 'PUT' })
    .then(() => loadRequests());
}

// INITIAL LOAD
loadRequests();
</script>

</body>
</html>
