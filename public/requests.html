<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Requests | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="mySidebar">
        <button class="btn text-white d-lg-none" style="position:absolute; right:10px; top:10px;" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <h4 class="text-center py-4">🩸 Blood Bank</h4>
        <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
        <a href="requests.html"><i class="fas fa-list me-2"></i> Requests</a>
        <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="content">
        <h2 class="fw-bold mb-4">Blood Requests List</h2>
        <div class="table-container shadow-lg">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Patient Name</th>
                            <th>Blood Group</th>
                            <th>City</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="requestTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById("mySidebar").classList.toggle("active"); }

        function loadRequests() {
            fetch('/requests').then(res => res.json()).then(data => {
                document.getElementById("requestTable").innerHTML = data.map(r => `
                    <tr>
                        <td><b>${r.name}</b></td>
                        <td><span class="badge bg-danger">${r.bloodGroup}</span></td>
                        <td>${r.city}</td>
                        <td><span class="badge ${r.status === 'Approved' ? 'bg-success' : 'bg-warning text-dark'}">${r.status || "Pending"}</span></td>
                        <td>
                            <button onclick="update('${r._id}', 'accept')" class="btn btn-success btn-sm"><i class="fas fa-check"></i></button>
                            <button onclick="update('${r._id}', 'reject')" class="btn btn-outline-danger btn-sm"><i class="fas fa-times"></i></button>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function update(id, type) {
            fetch(`/${type}-request/${id}`, { method: 'PUT' }).then(() => loadRequests());
        }
        loadRequests();
    </script>
</body>
</html>
