<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Requests | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<button class="btn btn-danger position-fixed d-lg-none" style="top:20px; left:20px; z-index:3500;" onclick="document.querySelector('.sidebar').classList.toggle('active')">☰</button>

<div class="sidebar">
    <h4 class="text-center py-4">🩸 Blood Bank</h4>
    <a href="donors.html"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a href="requests.html"><i class="fas fa-list me-2"></i> Requests</a>
    <a href="/logout" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<div class="content">
    <h2 class="fw-bold mb-4">Patient Requests List</h2>
    <div class="table-container shadow-lg">
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Patient Name</th>
                        <th>Blood Group</th>
                        <th>City</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requestTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
function loadRequests() {
    fetch('/requests-data')
    .then(r => r.json())
    .then(data => {
        document.getElementById('requestTable').innerHTML = data.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.bloodGroup}</td>
                <td>${r.city}</td>
                <td><span class="badge bg-warning">${r.status}</span></td>
            </tr>
        `).join('');
    });
}
loadRequests();
</script>
</body>
</html>
