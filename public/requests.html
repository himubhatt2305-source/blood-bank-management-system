<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h4 class="mb-5 text-danger">ADMIN CELL</h4>
        <a href="donors.html">Manage Donors</a>
        <a href="requests.html">Blood Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="content">
        <div class="glass-card">
            <h3 class="mb-4">Emergency Requests Queue</h3>
            <table class="table table-dark">
                <thead>
                    <tr><th>Patient Name</th><th>Blood Group</th><th>City</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="requestTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadRequests() {
            const res = await fetch('/requests-data');
            const data = await res.json();
            const tableBody = document.getElementById('requestTable');
            tableBody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.patientName || r.name || 'Emergency'}</td>
                    <td><span class="badge bg-danger">${r.bloodGroup}</span></td>
                    <td>${r.city}</td>
                    <td>
                        <span class="badge ${r.status === 'Accepted' ? 'bg-success' : r.status === 'Rejected' ? 'bg-danger' : 'bg-warning'}">
                            ${r.status || 'Pending'}
                        </span>
                    </td>
                    <td>
                        <button onclick="updateStatus('${r._id}', 'Accepted')" class="btn btn-sm btn-success">Approve</button>
                        <button onclick="updateStatus('${r._id}', 'Rejected')" class="btn btn-sm btn-outline-danger ms-1">Decline</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, s) {
            await fetch(`/update-request-status/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: s })
            });
            location.reload();
        }
        window.onload = loadRequests;
    </script>
</body>
</html>
