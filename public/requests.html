<!DOCTYPE html>
<html>

<head>
    <title>Requests</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h3>Dashboard</h3>
    <a href="donors.html">Donors</a>
    <a href="requests.html">Requests</a>
</div>

<div class="content">

    <h2>Blood Requests</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>City</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="req"></tbody>
    </table>

</div>

<script>
async function loadRequests() {
    const res = await fetch('/requests');
    const data = await res.json();

    let html = "";

    data.forEach(r => {
        html += `
        <tr>
            <td>${r.name}</td>
            <td>${r.bloodGroup}</td>
            <td>${r.city}</td>
            <td>${r.status || "Pending"}</td>
        </tr>`;
    });

    document.getElementById("req").innerHTML = html;
}

loadRequests();
</script>

</body>
</html>
