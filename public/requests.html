<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Requests | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="text-center mb-4">🩸 Blood Bank</h4>

        <a href="donors.html">Donors</a>
        <a href="requests.html">Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="card-box">
            <h3>Blood Requests</h3>

            <table class="table table-dark table-hover mt-3">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Blood Group</th>
                        <th>City</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="requestTable"></tbody>
            </table>
        </div>

    </div>

    <script>
        async function loadRequests() {
            try {
                const res = await fetch('/requests-data');
                const data = await res.json();

                console.log("REQUESTS:", data);

                let html = "";

                data.forEach(r => {
                    html += `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.bloodGroup}</td>
                    <td>${r.city}</td>
                    <td><span class="badge bg-warning">${r.status || "Pending"}</span></td>
                </tr>
            `;
                });

                document.getElementById("requestTable").innerHTML = html;

            } catch (err) {
                console.error("Error loading requests:", err);
            }
        }

        loadRequests();
    </script>

</body>

</html>
