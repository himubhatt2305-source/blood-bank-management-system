<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Requests</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="admin-layout">

        <aside class="sidebar">

            <div>

                <h2 class="sidebar-logo">
                    🩸 ADMIN
                </h2>

                <div class="sidebar-links">

                    <a href="donors.html">
                        Donors
                    </a>

                    <a href="requests.html" class="active-link">
                        Requests
                    </a>

                </div>

            </div>

            <a href="/logout" class="logout-btn">
                Logout
            </a>

        </aside>

        <main class="admin-main">

            <div class="page-top">

                <h1>
                    Emergency Requests
                </h1>

                <p>
                    Approve or reject blood requests
                </p>

            </div>

            <div class="table-glass">

                <table>

                    <thead>

                        <tr>

                            <th>Patient</th>
                            <th>Blood</th>
                            <th>City</th>
                            <th>Status</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="requestTable"></tbody>

                </table>

            </div>

        </main>

    </div>

    <script>

        async function loadRequests() {

            try {

                const res =
                    await fetch('/requests-data');

                const data =
                    await res.json();

                const table =
                    document.getElementById('requestTable');

                if (!data.length) {

                    table.innerHTML =
                        `
            <tr>
                <td colspan="5" style="text-align:center;padding:30px;">
                    No requests found
                </td>
            </tr>
            `;

                    return;

                }

                table.innerHTML =
                    data.map(r => `

        <tr>

            <td>
                ${r.patientName || r.name || 'Unknown'}
            </td>

            <td>

                <span class="blood-badge">

                    ${r.bloodGroup || 'N/A'}

                </span>

            </td>

            <td>
                ${r.city || '-'}
            </td>

            <td>

                <span class="
                status-badge
                ${r.status === 'Accepted'
                            ? 'accepted'
                            : r.status === 'Rejected'
                                ? 'rejected'
                                : 'pending'}">

                ${r.status || 'Pending'}

                </span>

            </td>

            <td class="action-flex">

                <button
                class="approve-btn"
                onclick="updateStatus('${r._id}','Accepted')">

                    Accept

                </button>

                <button
                class="reject-btn"
                onclick="updateStatus('${r._id}','Rejected')">

                    Reject

                </button>

            </td>

        </tr>

        `).join('');

            }

            catch (err) {

                console.log(err);

            }

        }

        async function updateStatus(id, status) {

            try {

                const res =
                    await fetch(`/update-request-status/${id}`, {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify({ status })

                    });

                const data =
                    await res.json();

                if (data.success) {

                    loadRequests();

                }

                else {

                    alert("Update failed");

                }

            }

            catch (err) {

                alert("Server error");

            }

        }

        window.onload = loadRequests;

    </script>

</body>

</html>
