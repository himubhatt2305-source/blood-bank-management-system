<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | Blood Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

    <h4 class="text-danger fw-bold">
        🩸 ADMIN CELL
    </h4>

    <a href="donors.html">
        Manage Donors
    </a>

    <a href="requests.html">
        Blood Requests
    </a>

    <a href="/logout">
        Logout
    </a>

</div>

<div class="content">

    <div class="glass-card">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div>

                <h2 class="fw-bold">
                    Emergency Blood Requests
                </h2>

                <p class="text-secondary mb-0">
                    Real-time emergency request management
                </p>

            </div>

            <div class="badge bg-danger fs-6 px-3 py-2">
                Live Queue
            </div>

        </div>

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>

                    <tr>

                        <th>Patient</th>

                        <th>Blood Group</th>

                        <th>City</th>

                        <th>Phone</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="requestTable"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

async function loadRequests(){

    const res = await fetch(
        '/requests-data?t=' + Date.now()
    );

    const data = await res.json();

    const table = document.getElementById(
        "requestTable"
    );

    if(data.length === 0){

        table.innerHTML = `

        <tr>

            <td colspan="6" class="text-center text-secondary py-5">

                No Emergency Requests Found

            </td>

        </tr>

        `;

        return;
    }

    table.innerHTML = data.map(r => `

        <tr>

            <td>

                ${r.patientName || r.name || "Emergency"}

            </td>

            <td>

                <span class="badge bg-danger">

                    ${r.bloodGroup || "N/A"}

                </span>

            </td>

            <td>

                ${r.city || "Unknown"}

            </td>

            <td>

                ${r.phone || "N/A"}

            </td>

            <td>

                <span class="badge ${
                    r.status === "Accepted"
                    ? "bg-success"

                    : r.status === "Rejected"
                    ? "bg-danger"

                    : "bg-warning text-dark"
                }">

                    ${r.status || "Pending"}

                </span>

            </td>

            <td class="d-flex gap-2 flex-wrap">

                <button

                onclick="updateStatus('${r._id}','Accepted')"

                class="btn btn-success btn-sm">

                    Accept

                </button>

                <button

                onclick="updateStatus('${r._id}','Rejected')"

                class="btn btn-danger btn-sm">

                    Reject

                </button>

            </td>

        </tr>

    `).join("");

}

async function updateStatus(id, status){

    const response = await fetch(

        `/update-request-status/${id}`,

        {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify({

                status: status

            })

        }

    );

    const result = await response.json();

    if(result.success){

        loadRequests();

    } else {

        alert("Status Update Failed");

    }

}

window.onload = loadRequests;

</script>

</body>
</html>
