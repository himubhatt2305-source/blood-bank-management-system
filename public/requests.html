<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Requests | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">🩸 Admin</h4>
        <a href="donors.html">Manage Donors</a>
        <a href="requests.html">Blood Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="content">
        <div class="card-box">
            <h3 class="mb-4">Blood Requests</h3>
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Group</th>
                        <th>City</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requestTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadRequests() {
            const res = await fetch('/requests-data');
            const data = await res.json();
            const tableBody = document.getElementById('requestTable');
            tableBody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td><span class="badge bg-danger">${r.bloodGroup}</span></td>
                    <td>${r.city}</td>
                    <td><span class="badge bg-warning text-dark">${r.status || 'Pending'}</span></td>
                    <td>
                        <button onclick="updateStatus('${r._id}', 'Accepted')" class="btn btn-sm btn-success">Accept</button>
                        <button onclick="updateStatus('${r._id}', 'Rejected')" class="btn btn-sm btn-danger">Reject</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`/update-request-status/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status })
            });
            location.reload();
        }
        window.onload = loadRequests;
    </script>
</body>
</html>
