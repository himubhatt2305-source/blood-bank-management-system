<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blood Requests</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

    <h4>
        🩸
    </h4>

    <a href="donors.html">
        Manage Donors
    </a>

    <a href="requests.html">
        Blood Requests
    </a>

    <a href="/logout">
        Logout
    </a>

</div>

<div class="content">

    <div class="glass-card">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div>

                <h2>
                    Emergency Requests
                </h2>

                <p class="text-secondary">

                    Live patient blood request queue

                </p>

            </div>

        </div>

        <div class="table-responsive">

            <table class="table-custom">

                <thead>

                    <tr>

                        <th>Patient</th>

                        <th>Blood</th>

                        <th>City</th>

                        <th>Phone</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="requestTable"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

async function loadRequests(){

    const res =
    await fetch('/requests-data?t=' + Date.now());

    const data = await res.json();

    const table =
    document.getElementById("requestTable");

    if(data.length === 0){

        table.innerHTML = `

        <tr>

            <td colspan="6">

                No Requests Found

            </td>

        </tr>

        `;

        return;
    }

    table.innerHTML = data.map(r => `

        <tr>

            <td>

                ${r.patientName || r.name || "Emergency"}

            </td>

            <td>

                <span class="badge-red">

                    ${r.bloodGroup || "N/A"}

                </span>

            </td>

            <td>

                ${r.city || "Unknown"}

            </td>

            <td>

                ${r.phone || "N/A"}

            </td>

            <td>

                ${
                    r.status === "Accepted"

                    ?

                    `<span class="badge-green">
                        Accepted
                    </span>`

                    :

                    r.status === "Rejected"

                    ?

                    `<span class="badge-red">
                        Rejected
                    </span>`

                    :

                    `<span class="badge-yellow">
                        Pending
                    </span>`
                }

            </td>

            <td>

                <div class="d-flex gap-2 flex-wrap">

                    <button
                    onclick="updateStatus('${r._id}','Accepted')"
                    class="action-btn accept-btn">

                        Accept

                    </button>

                    <button
                    onclick="updateStatus('${r._id}','Rejected')"
                    class="action-btn reject-btn">

                        Reject

                    </button>

                </div>

            </td>

        </tr>

    `).join("");

}

async function updateStatus(id,status){

    const res = await fetch(

        `/update-request-status/${id}`,

        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                status
            })

        }

    );

    const result = await res.json();

    if(result.success){

        loadRequests();

    } else {

        alert("Update Failed");

    }

}

window.onload = loadRequests;

</script>

</body>
</html>
