<!DOCTYPE html>
<html>
<head>
    <title>Requests Dashboard | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">🩸 Admin</h4>
        <a href="donors.html">Donors List</a>
        <a href="requests.html">Blood Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="content">
        <div class="card-box">
            <h3 class="mb-4">📋 Emergency Blood Requests</h3>
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Patient Name</th>
                        <th>Blood Group</th>
                        <th>City</th>
                        <th>Phone</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="requestTable">
                    <tr><td colspan="5" class="text-center">Loading requests...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadRequests() {
            try {
                const res = await fetch('/requests-data');
                const data = await res.json();
                const tableBody = document.getElementById('requestTable');

                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center">No active requests</td></tr>';
                    return;
                }

                tableBody.innerHTML = data.map(r => `
                    <tr>
                        <td>${r.name}</td>
                        <td><span class="badge bg-danger">${r.bloodGroup}</span></td>
                        <td>${r.city}</td>
                        <td>${r.phone || 'N/A'}</td>
                        <td><span class="badge bg-warning text-dark">${r.status || "Pending"}</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('requestTable').innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
            }
        }
        window.onload = loadRequests;
    </script>
</body>
</html>
